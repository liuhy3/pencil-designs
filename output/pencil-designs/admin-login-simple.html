<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理系统登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 400px;
      max-width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    
    .logo-icon svg {
      width: 32px;
      height: 32px;
      fill: white;
    }
    
    .logo h1 {
      font-size: 24px;
      color: #333;
      font-weight: 600;
    }
    
    .logo p {
      color: #666;
      font-size: 14px;
      margin-top: 8px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-label {
      display: block;
      color: #333;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    
    .form-input {
      width: 100%;
      height: 44px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0 16px;
      font-size: 15px;
      color: #333;
      transition: all 0.2s;
    }
    
    .form-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .form-input::placeholder {
      color: #999;
    }
    
    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 14px;
    }
    
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #666;
    }
    
    .remember input {
      width: 16px;
      height: 16px;
      accent-color: #667eea;
    }
    
    .forgot {
      color: #667eea;
      text-decoration: none;
    }
    
    .forgot:hover {
      text-decoration: underline;
    }
    
    .login-btn {
      width: 100%;
      height: 44px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .login-btn:active {
      transform: translateY(0);
    }
    
    .footer-text {
      text-align: center;
      margin-top: 24px;
      color: #999;
      font-size: 12px;
    }
    
    /* 错误提示 */
    .error-msg {
      color: #e74c3c;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }
    
    .form-group.error .form-input {
      border-color: #e74c3c;
    }
    
    .form-group.error .error-msg {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1>管理系统</h1>
      <p>企业级后台管理平台</p>
    </div>
    
    <!-- 登录表单 -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group" id="usernameGroup">
        <label class="form-label">用户名</label>
        <input type="text" class="form-input" id="username" placeholder="请输入用户名" autocomplete="username">
        <div class="error-msg">用户名不能为空</div>
      </div>
      
      <div class="form-group" id="passwordGroup">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" id="password" placeholder="请输入密码" autocomplete="current-password">
        <div class="error-msg">密码不能为空</div>
      </div>
      
      <div class="options">
        <label class="remember">
          <input type="checkbox" id="remember">
          记住密码
        </label>
        <a href="#" class="forgot">忘记密码？</a>
      </div>
      
      <button type="submit" class="login-btn">登录</button>
    </form>
    
    <div class="footer-text">
      © 2026 管理系统 · 安全登录
    </div>
  </div>
  
  <script>
    function handleLogin(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      
      // 清除之前的错误
      document.getElementById('usernameGroup').classList.remove('error');
      document.getElementById('passwordGroup').classList.remove('error');
      
      // 验证
      let hasError = false;
      
      if (!username) {
        document.getElementById('usernameGroup').classList.add('error');
        hasError = true;
      }
      
      if (!password) {
        document.getElementById('passwordGroup').classList.add('error');
        hasError = true;
      }
      
      if (hasError) return;
      
      // 模拟登录
      alert('登录成功！即将跳转到管理后台...');
    }
  </script>
</body>
</html>
