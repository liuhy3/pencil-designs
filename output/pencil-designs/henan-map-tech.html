      {name: '焦作市', value: 35},
      {name: '濮阳市', value: 32},
      {name: '许昌市', value: 52},
      {name: '漯河市', value: 28},
      {name: '三门峡市', value: 22},
      {name: '南阳市', value: 55},
      {name: '商丘市', value: 48},
      {name: '信阳市', value: 42},
      {name: '周口市', value: 38},
      {name: '驻马店市', value: 35},
      {name: '济源市', value: 12}
    ];
    
    var flowLines = [
      {src: '郑州', dst: '开封', value: 45},
      {src: '郑州', dst: '洛阳', value: 62},
      {src: '郑州', dst: '新乡', value: 48},
      {src: '郑州', dst: '许昌', value: 52},
      {src: '郑州', dst: '平顶山', value: 38},
      {src: '郑州', dst: '焦作', value: 35},
      {src: '郑州', dst: '安阳', value: 42},
      {src: '郑州', dst: '商丘', value: 48},
      {src: '郑州', dst: '南阳', value: 55},
      {src: '郑州', dst: '信阳', value: 42},
      {src: '郑州', dst: '周口', value: 38},
      {src: '洛阳', dst: '三门峡', value: 22},
      {src: '洛阳', dst: '平顶山', value: 38},
      {src: '洛阳', dst: '南阳', value: 55},
      {src: '新乡', dst: '鹤壁', value: 25},
      {src: '新乡', dst: '焦作', value: 35},
      {src: '新乡', dst: '濮阳', value: 32},
      {src: '许昌', dst: '漯河', value: 28},
      {src: '南阳', dst: '驻马店', value: 35},
      {src: '安阳', dst: '鹤壁', value: 25}
    ];
    
    var linesData = flowLines.map(function(flow) {
      var src = cityCenters[flow.src];
      var dst = cityCenters[flow.dst];
      return {
        coords: [src, dst],
        lineStyle: {
          color: '#00ff88',
          width: 2,
          curveness: 0.2
        }
      };
    });
    
    var nodeData = Object.keys(cityCenters).map(function(name) {
      var fullName = name + '市';
      var value = trafficData.find(function(d) { return d.name === fullName; });
      return {
        name: name,
        value: cityCenters[name].concat(value ? value.value : 30)
      };
    });
    
    var chart = echarts.init(document.getElementById('main'));
    
    var option = {
      backgroundColor: '#0a1628',
      title: {
        text: '河南省网络流量拓扑图',
        left: 'center',
        top: 20,
        textStyle: { color: '#00ff88', fontSize: 24, fontWeight: 'bold' }
      },
      tooltip: {
        trigger: 'item',
        backgroundColor: '#0d2a4a',
        borderColor: '#00ff88',
        textStyle: { color: '#fff' },
        formatter: function(params) {
          if (params.seriesType === 'effectScatter') {
            return params.name + '<br/>流量: ' + params.value[2] + 'G';
          }
          return params.name;
        }
      },
      geo: {
        map: 'henan',
        roam: true,
        zoom: 1.2,
        label: { show: false },
        itemStyle: {
          areaColor: '#0d2a4a',
          borderColor: '#00ff88',
          borderWidth: 2
        },
        emphasis: {
          itemStyle: {
            areaColor: '#1a4a7a'
          }
        }
      },
      series: [
        {
          type: 'map',
          map: 'henan',
          data: trafficData.map(function(d) {
            return {
              name: d.name,
              itemStyle: {
                areaColor: '#0d2a4a'
              }
            };
          })
        },
        {
          type: 'lines',
          zlevel: 2,
          effect: {
            show: true,
            period: 4,
            trailLength: 0.3,
            symbol: 'arrow',
            symbolSize: 6,
            color: '#00ff88'
          },
          lineStyle: { curveness: 0.2 },
          data: linesData
        },
        {
          type: 'effectScatter',
          coordinateSystem: 'geo',
          zlevel: 3,
          rippleEffect: {
            brushType: 'stroke',
            scale: 5,
            period: 3
          },
          symbol: 'circle',
          symbolSize: function(val) { return val[2] / 3 + 8; },
          itemStyle: {
            color: '#00ff88',
            shadowBlur: 20,
            shadowColor: '#00ff88'
          },
          label: {
            show: true,
            position: 'right',
            formatter: '{b}',
            fontSize: 11,
            color: '#00ff88'
          },
          data: nodeData
        }
      ]
    };
    
    chart.setOption(option);
    window.addEventListener('resize', function() { chart.resize(); });
  </script>
</body>
</html>
