<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>端口组管理</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        /* 标题栏 */
        .header {
            background: #E6F0FA;
            color: #333333;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid #d9d9d9;
        }

        /* 筛选条件区域 */
        .filter-section {
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid #e8e8e8;
        }

        .filter-row {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-item label {
            font-size: 13px;
            color: #333333;
            white-space: nowrap;
        }

        .filter-item input[type="text"],
        .filter-item select {
            padding: 6px 10px;
            border: 1px solid #d9d9d9;
            border-radius: 3px;
            font-size: 13px;
            min-width: 160px;
            outline: none;
        }

        .filter-item input[type="text"]:focus,
        .filter-item select:focus {
            border-color: #4AB9D9;
        }

        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #4AB9D9;
            color: white;
        }

        .btn-primary:hover {
            background: #3aa8c8;
        }

        /* 操作按钮栏 */
        .action-bar {
            padding: 12px 20px;
            background: white;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: #4AB9D9;
            color: white;
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: #3aa8c8;
        }

        .action-btn i {
            font-size: 14px;
        }

        .select-all-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #333333;
        }

        .checkbox {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* 表格区域 */
        .table-section {
            background: white;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #0078D7;
        }

        th {
            padding: 10px 12px;
            text-align: center;
            font-weight: normal;
            color: white;
            font-size: 13px;
            border-right: 1px solid #0063b1;
            white-space: nowrap;
        }

        th:last-child {
            border-right: none;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #e8e8e8;
            font-size: 13px;
            color: #333333;
            border-right: 1px solid #e8e8e8;
            text-align: center;
        }

        td:last-child {
            border-right: none;
        }

        tbody tr {
            background: white;
        }

        tbody tr:nth-child(even) {
            background: #f9f9f9;
        }

        tbody tr.selected {
            background: #FFF9C4 !important;
        }

        tbody tr:hover {
            background: #f0f8ff;
        }

        tbody tr.selected:hover {
            background: #FFF9C4 !important;
        }

        .no-data {
            text-align: center;
            padding: 60px 0;
            color: #999;
            font-size: 14px;
        }

        /* 分页样式 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 8px;
            background: white;
            border-top: 1px solid #e8e8e8;
        }

        .pagination-btn {
            padding: 6px 12px;
            border: 1px solid #d9d9d9;
            background: white;
            color: #333;
            font-size: 13px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.3s;
        }

        .pagination-btn:hover:not(:disabled) {
            color: #4AB9D9;
            border-color: #4AB9D9;
        }

        .pagination-btn:disabled {
            color: #ccc;
            cursor: not-allowed;
        }

        .pagination-btn.active {
            background: #4AB9D9;
            color: white;
            border-color: #4AB9D9;
        }

        .pagination-info {
            font-size: 13px;
            color: #666;
            margin: 0 10px;
        }

        .pagination-jump {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #666;
        }

        .pagination-jump input {
            width: 50px;
            padding: 5px;
            border: 1px solid #d9d9d9;
            border-radius: 3px;
            text-align: center;
            font-size: 13px;
        }

        .pagination-jump button {
            padding: 5px 10px;
            border: 1px solid #d9d9d9;
            background: white;
            color: #333;
            font-size: 13px;
            cursor: pointer;
            border-radius: 3px;
        }

        .pagination-jump button:hover {
            color: #4AB9D9;
            border-color: #4AB9D9;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <!-- 标题栏 -->
            <div class="header">
                端口组管理
            </div>

            <!-- 筛选条件区域 -->
            <div class="filter-section">
                <div class="filter-row">
                    <div class="filter-item">
                        <label>端口组名称：</label>
                        <input
                            type="text"
                            v-model="searchForm.portGroupName"
                            placeholder="请输入端口组名称"
                        >
                    </div>
                    <div class="filter-item">
                        <button class="btn btn-primary" @click="handleSearch">
                            <i class="fas fa-search"></i>
                            查询
                        </button>
                    </div>
                </div>
            </div>

            <!-- 操作按钮栏 -->
            <div class="action-bar">
                <div class="action-buttons">
                    <div class="select-all-wrapper">
                        <input
                            type="checkbox"
                            class="checkbox"
                            v-model="selectAll"
                            @change="handleSelectAll"
                        >
                        <label>全选</label>
                    </div>
                    <button class="action-btn" @click="handleAdd">
                        <i class="fas fa-plus"></i>
                        新增
                    </button>
                    <button class="action-btn" @click="handleEdit">
                        <i class="fas fa-edit"></i>
                        修改
                    </button>
                    <button class="action-btn" @click="handleDelete">
                        <i class="fas fa-trash"></i>
                        删除
                    </button>
                </div>
                <div class="action-buttons">
                    <button class="action-btn" @click="handleExport">
                        <i class="fas fa-download"></i>
                        导出
                    </button>
                </div>
            </div>

            <!-- 数据表格 -->
            <div class="table-section">
                <div class="table-wrapper">
                    <table v-if="filteredData.length > 0">
                        <thead>
                            <tr>
                                <th style="width: 50px;">
                                    <input
                                        type="checkbox"
                                        class="checkbox"
                                        v-model="selectAll"
                                        @change="handleSelectAll"
                                    >
                                </th>
                                <th>端口组名称</th>
                                <th>设备名称</th>
                                <th>端口名称</th>
                                <th>端口IP</th>
                                <th>端口描述</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr
                                v-for="(item, index) in paginatedData"
                                :key="index"
                                :class="{ selected: item.selected }"
                            >
                                <td>
                                    <input
                                        type="checkbox"
                                        class="checkbox"
                                        v-model="item.selected"
                                    >
                                </td>
                                <td>{{ item.portGroupName }}</td>
                                <td>{{ item.deviceName }}</td>
                                <td>{{ item.portName }}</td>
                                <td>{{ item.portIp }}</td>
                                <td>{{ item.portDescription }}</td>
                            </tr>
                        </tbody>
                    </table>
                    <div v-else class="no-data">
                        <div>暂无数据</div>
                    </div>
                </div>
            </div>

            <!-- 分页 -->
            <div class="pagination" v-if="filteredData.length > 0">
                <button class="pagination-btn" @click="handlePageChange(1)" :disabled="currentPage === 1">首页</button>
                <button class="pagination-btn" @click="handlePageChange(currentPage - 1)" :disabled="currentPage === 1">上一页</button>

                <template v-for="page in displayPages" :key="page">
                    <button
                        v-if="page !== '...'"
                        class="pagination-btn"
                        :class="{ active: page === currentPage }"
                        @click="handlePageChange(page)"
                    >
                        {{ page }}
                    </button>
                    <span v-else class="pagination-info">...</span>
                </template>

                <button class="pagination-btn" @click="handlePageChange(currentPage + 1)" :disabled="currentPage === totalPages">下一页</button>
                <button class="pagination-btn" @click="handlePageChange(totalPages)" :disabled="currentPage === totalPages">末页</button>

                <span class="pagination-info">
                    共 {{ filteredData.length }} 条，第 {{ currentPage }} / {{ totalPages }} 页
                </span>

                <div class="pagination-jump">
                    <span>跳至</span>
                    <input
                        type="number"
                        v-model="jumpPage"
                        :min="1"
                        :max="totalPages"
                        @keyup.enter="handleJump"
                    >
                    <span>页</span>
                    <button @click="handleJump">跳转</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, reactive, computed, watch, ref } = Vue;

        createApp({
            setup() {
                // 查询表单
                const searchForm = reactive({
                    portGroupName: ''
                });

                // 全选状态
                const selectAll = ref(false);

                // 分页状态
                const currentPage = ref(1);
                const pageSize = ref(10);
                const jumpPage = ref('');

                // 模拟数据
                const mockData = [
                    {
                        portGroupName: 'C-I端口组',
                        deviceName: '核心交换机-01',
                        portName: 'Gi1/0/1',
                        portIp: '192.168.1.1',
                        portDescription: '上行链路',
                        selected: false
                    },
                    {
                        portGroupName: 'C-I端口组',
                        deviceName: '核心交换机-02',
                        portName: 'Gi1/0/2',
                        portIp: '192.168.1.2',
                        portDescription: '上行链路',
                        selected: false
                    },
                    {
                        portGroupName: 'A-B端口组',
                        deviceName: '接入交换机-01',
                        portName: 'Fa0/1',
                        portIp: '192.168.2.1',
                        portDescription: '用户接入',
                        selected: false
                    },
                    {
                        portGroupName: 'A-B端口组',
                        deviceName: '接入交换机-02',
                        portName: 'Fa0/2',
                        portIp: '192.168.2.2',
                        portDescription: '用户接入',
                        selected: false
                    },
                    {
                        portGroupName: '汇聚端口组',
                        deviceName: '汇聚交换机-01',
                        portName: 'Te1/1',
                        portIp: '10.0.0.1',
                        portDescription: '骨干链路',
                        selected: false
                    },
                    {
                        portGroupName: 'C-I端口组',
                        deviceName: '核心交换机-03',
                        portName: 'Gi1/0/3',
                        portIp: '192.168.1.3',
                        portDescription: '上行链路',
                        selected: false
                    },
                    {
                        portGroupName: 'A-B端口组',
                        deviceName: '接入交换机-03',
                        portName: 'Gi0/1',
                        portIp: '192.168.2.3',
                        portDescription: '用户接入',
                        selected: false
                    },
                    {
                        portGroupName: '汇聚端口组',
                        deviceName: '汇聚交换机-02',
                        portName: 'Te1/2',
                        portIp: '10.0.0.2',
                        portDescription: '骨干链路',
                        selected: false
                    },
                    {
                        portGroupName: 'C-I端口组',
                        deviceName: '核心交换机-04',
                        portName: 'Gi1/0/4',
                        portIp: '192.168.1.4',
                        portDescription: '上行链路',
                        selected: false
                    },
                    {
                        portGroupName: 'A-B端口组',
                        deviceName: '接入交换机-04',
                        portName: 'Te1/1',
                        portIp: '192.168.2.4',
                        portDescription: '用户接入',
                        selected: false
                    },
                    {
                        portGroupName: '汇聚端口组',
                        deviceName: '汇聚交换机-03',
                        portName: 'Hu1/1',
                        portIp: '10.0.0.3',
                        portDescription: '骨干链路',
                        selected: false
                    },
                    {
                        portGroupName: 'C-I端口组',
                        deviceName: '核心交换机-05',
                        portName: 'Gi1/0/5',
                        portIp: '192.168.1.5',
                        portDescription: '上行链路',
                        selected: false
                    }
                ];

                // 过滤后的数据
                const filteredData = computed(() => {
                    let result = mockData;

                    if (searchForm.portGroupName) {
                        result = result.filter(item =>
                            item.portGroupName.toLowerCase().includes(searchForm.portGroupName.toLowerCase())
                        );
                    }

                    return result;
                });

                // 总页数
                const totalPages = computed(() => {
                    return Math.ceil(filteredData.value.length / pageSize.value);
                });

                // 当前页的数据
                const paginatedData = computed(() => {
                    const start = (currentPage.value - 1) * pageSize.value;
                    const end = start + pageSize.value;
                    return filteredData.value.slice(start, end);
                });

                // 显示的页码
                const displayPages = computed(() => {
                    const pages = [];
                    const total = totalPages.value;
                    const current = currentPage.value;

                    if (total <= 7) {
                        for (let i = 1; i <= total; i++) {
                            pages.push(i);
                        }
                    } else {
                        if (current <= 4) {
                            for (let i = 1; i <= 5; i++) {
                                pages.push(i);
                            }
                            pages.push('...');
                            pages.push(total);
                        } else if (current >= total - 3) {
                            pages.push(1);
                            pages.push('...');
                            for (let i = total - 4; i <= total; i++) {
                                pages.push(i);
                            }
                        } else {
                            pages.push(1);
                            pages.push('...');
                            for (let i = current - 1; i <= current + 1; i++) {
                                pages.push(i);
                            }
                            pages.push('...');
                            pages.push(total);
                        }
                    }

                    return pages;
                });

                // 切换页面
                const handlePageChange = (page) => {
                    if (page < 1 || page > totalPages.value) return;
                    currentPage.value = page;
                    jumpPage.value = '';
                    // 切换页面时清空选择状态
                    selectAll.value = false;
                };

                // 跳转页面
                const handleJump = () => {
                    const page = parseInt(jumpPage.value);
                    if (isNaN(page) || page < 1 || page > totalPages.value) {
                        alert('请输入有效的页码');
                        return;
                    }
                    handlePageChange(page);
                };

                // 全选/取消全选
                const handleSelectAll = () => {
                    paginatedData.value.forEach(item => {
                        item.selected = selectAll.value;
                    });
                };

                // 监听单个复选框变化，更新全选状态
                watch(() => paginatedData.value.map(item => item.selected), (newVal) => {
                    selectAll.value = paginatedData.value.length > 0 &&
                        paginatedData.value.every(item => item.selected);
                }, { deep: true });

                // 监听过滤条件变化，重置到第一页
                watch(() => searchForm.portGroupName, () => {
                    currentPage.value = 1;
                    selectAll.value = false;
                });

                // 查询
                const handleSearch = () => {
                    console.log('查询条件：', searchForm);
                };

                // 新增
                const handleAdd = () => {
                    alert('新增功能');
                };

                // 修改
                const handleEdit = () => {
                    const selectedItems = filteredData.value.filter(item => item.selected);
                    if (selectedItems.length === 0) {
                        alert('请先选择要修改的数据');
                    } else {
                        alert(`修改 ${selectedItems.length} 条数据`);
                    }
                };

                // 删除
                const handleDelete = () => {
                    const selectedItems = filteredData.value.filter(item => item.selected);
                    if (selectedItems.length === 0) {
                        alert('请先选择要删除的数据');
                    } else {
                        if (confirm(`确定要删除选中的 ${selectedItems.length} 条数据吗？`)) {
                            alert('删除成功');
                        }
                    }
                };

                // 导出
                const handleExport = () => {
                    alert('导出功能');
                };

                return {
                    searchForm,
                    filteredData,
                    paginatedData,
                    selectAll,
                    currentPage,
                    totalPages,
                    pageSize,
                    jumpPage,
                    displayPages,
                    handleSearch,
                    handleAdd,
                    handleEdit,
                    handleDelete,
                    handleExport,
                    handleSelectAll,
                    handlePageChange,
                    handleJump
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
