<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后端登录 - Admin Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/antd@5.12.8/dist/reset.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #1890ff;
      --primary-hover: #40a9ff;
      --bg-dark: #001529;
      --bg-light: #f0f2f5;
      --text-primary: #262626;
      --text-secondary: #8c8c8c;
      --border: #d9d9d9;
      --error: #ff4d4f;
      --success: #52c41a;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      display: flex;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
      max-width: 900px;
      width: 100%;
      min-height: 500px;
    }
    
    /* 左侧品牌区域 */
    .brand-section {
      width: 380px;
      background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%);
      padding: 60px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    
    .brand-section::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 50%);
      animation: pulse 4s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.1); opacity: 0.5; }
    }
    
    .brand-logo {
      font-size: 48px;
      margin-bottom: 24px;
    }
    
    .brand-title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .brand-subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 40px;
      line-height: 1.6;
    }
    
    .brand-features {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: rgba(255,255,255,0.9);
    }
    
    .feature-icon {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    
    /* 右侧登录表单 */
    .login-section {
      flex: 1;
      padding: 60px 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .login-header {
      margin-bottom: 32px;
    }
    
    .login-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    
    .login-desc {
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    /* 表单样式 */
    .form-group {
      margin-bottom: 24px;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      color: var(--text-primary);
      margin-bottom: 8px;
      font-weight: 500;
    }
    
    .form-input {
      width: 100%;
      height: 40px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 14px;
      color: var(--text-primary);
      transition: all 0.2s;
      outline: none;
    }
    
    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(24,144,255,0.2);
    }
    
    .form-input::placeholder {
      color: #bfbfbf;
    }
    
    .form-input.error {
      border-color: var(--error);
    }
    
    .input-wrapper {
      position: relative;
    }
    
    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    .input-wrapper .form-input {
      padding-left: 36px;
    }
    
    .input-action {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
    }
    
    .input-action:hover {
      color: var(--primary);
    }
    
    .error-message {
      font-size: 12px;
      color: var(--error);
      margin-top: 4px;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    /* 记住密码 & 忘记密码 */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    
    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    
    .checkbox {
      width: 16px;
      height: 16px;
      border: 1px solid var(--border);
      border-radius: 2px;
      position: relative;
      transition: all 0.2s;
    }
    
    .checkbox.checked {
      background: var(--primary);
      border-color: var(--primary);
    }
    
    .checkbox.checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 10px;
    }
    
    .checkbox-label {
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    .forgot-link {
      font-size: 14px;
      color: var(--primary);
      cursor: pointer;
      transition: color 0.2s;
    }
    
    .forgot-link:hover {
      color: var(--primary-hover);
    }
    
    /* 登录按钮 */
    .login-btn {
      width: 100%;
      height: 40px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    
    .login-btn:hover {
      background: var(--primary-hover);
    }
    
    .login-btn:disabled {
      background: #d9d9d9;
      cursor: not-allowed;
    }
    
    .login-btn.loading {
      opacity: 0.7;
      cursor: wait;
    }
    
    /* 分割线 */
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
    }
    
    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    
    .divider-text {
      padding: 0 16px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    /* 其他登录方式 */
    .other-login {
      display: flex;
      justify-content: center;
      gap: 24px;
    }
    
    .other-btn {
      width: 48px;
      height: 48px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
    }
    
    .other-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    
    /* 注册提示 */
    .register-tip {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    .register-link {
      color: var(--primary);
      cursor: pointer;
      margin-left: 4px;
    }
    
    .register-link:hover {
      color: var(--primary-hover);
    }
    
    /* 响应式 */
    @media (max-width: 768px) {
      .login-container {
        flex-direction: column;
        max-width: 400px;
      }
      
      .brand-section {
        width: 100%;
        padding: 40px 30px;
        min-height: 200px;
      }
      
      .brand-features {
        display: none;
      }
      
      .login-section {
        padding: 40px 30px;
      }
    }
    
    /* 验证码输入 */
    .captcha-wrapper {
      display: flex;
      gap: 12px;
    }
    
    .captcha-input {
      flex: 1;
    }
    
    .captcha-img {
      width: 120px;
      height: 40px;
      background: #f5f5f5;
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      color: #666;
      letter-spacing: 4px;
      cursor: pointer;
      user-select: none;
    }
    
    .captcha-img:hover {
      border-color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- 左侧品牌区域 -->
    <div class="brand-section">
      <div class="brand-logo">🔐</div>
      <div class="brand-title">Admin Portal</div>
      <div class="brand-subtitle">安全、可靠的后台管理系统，为您的业务保驾护航</div>
      <div class="brand-features">
        <div class="feature-item">
          <div class="feature-icon">🛡️</div>
          <span>多重身份验证</span>
        </div>
        <div class="feature-item">
          <div class="feature-icon">📊</div>
          <span>实时数据监控</span>
        </div>
        <div class="feature-item">
          <div class="feature-icon">⚡</div>
          <span>高性能架构</span>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🔒</div>
          <span>端到端加密</span>
        </div>
      </div>
    </div>
    
    <!-- 右侧登录表单 -->
    <div class="login-section">
      <div class="login-header">
        <div class="login-title">管理员登录</div>
        <div class="login-desc">请输入您的账号信息登录系统</div>
      </div>
      
      <!-- 用户名 -->
      <div class="form-group">
        <label class="form-label">用户名</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input type="text" class="form-input" placeholder="请输入用户名" id="username">
        </div>
        <div class="error-message" id="usernameError">请输入用户名</div>
      </div>
      
      <!-- 密码 -->
      <div class="form-group">
        <label class="form-label">密码</label>
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input type="password" class="form-input" placeholder="请输入密码" id="password">
          <span class="input-action" id="togglePassword">👁️</span>
        </div>
        <div class="error-message" id="passwordError">请输入密码</div>
      </div>
      
      <!-- 验证码 -->
      <div class="form-group">
        <label class="form-label">验证码</label>
        <div class="captcha-wrapper">
          <div class="input-wrapper captcha-input">
            <span class="input-icon">🔢</span>
            <input type="text" class="form-input" placeholder="请输入验证码" id="captcha" maxlength="4">
          </div>
          <div class="captcha-img" id="captchaImg" title="点击刷新">A8X2</div>
        </div>
        <div class="error-message" id="captchaError">请输入验证码</div>
      </div>
      
      <!-- 记住密码 & 忘记密码 -->
      <div class="form-options">
        <div class="checkbox-wrapper" id="rememberWrapper">
          <div class="checkbox" id="rememberCheckbox"></div>
          <span class="checkbox-label">记住密码</span>
        </div>
        <span class="forgot-link">忘记密码？</span>
      </div>
      
      <!-- 登录按钮 -->
      <button class="login-btn" id="loginBtn">登录</button>
      
      <!-- 分割线 -->
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">其他方式</span>
        <div class="divider-line"></div>
      </div>
      
      <!-- 其他登录方式 -->
      <div class="other-login">
        <div class="other-btn" title="企业微信">💬</div>
        <div class="other-btn" title="钉钉">📱</div>
        <div class="other-btn" title="飞书">🚀</div>
      </div>
      
      <!-- 注册提示 -->
      <div class="register-tip">
        还没有账号？<span class="register-link">联系管理员</span>
      </div>
    </div>
  </div>
  
  <script>
    // 密码显示切换
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    togglePassword.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
    });
    
    // 记住密码
    const rememberWrapper = document.getElementById('rememberWrapper');
    const rememberCheckbox = document.getElementById('rememberCheckbox');
    
    rememberWrapper.addEventListener('click', () => {
      rememberCheckbox.classList.toggle('checked');
    });
    
    // 验证码刷新
    const captchaImg = document.getElementById('captchaImg');
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    
    function generateCaptcha() {
      let code = '';
      for (let i = 0; i < 4; i++) {
        code += chars[Math.floor(Math.random() * chars.length)];
      }
      captchaImg.textContent = code;
      return code;
    }
    
    captchaImg.addEventListener('click', () => {
      generateCaptcha();
    });
    
    // 表单验证
    const loginBtn = document.getElementById('loginBtn');
    const usernameInput = document.getElementById('username');
    const captchaInput = document.getElementById('captcha');
    
    function validate() {
      let valid = true;
      
      // 用户名验证
      if (!usernameInput.value.trim()) {
        document.getElementById('usernameError').classList.add('show');
        usernameInput.classList.add('error');
        valid = false;
      } else {
        document.getElementById('usernameError').classList.remove('show');
        usernameInput.classList.remove('error');
      }
      
      // 密码验证
      if (!passwordInput.value.trim()) {
        document.getElementById('passwordError').classList.add('show');
        passwordInput.classList.add('error');
        valid = false;
      } else {
        document.getElementById('passwordError').classList.remove('show');
        passwordInput.classList.remove('error');
      }
      
      // 验证码验证
      if (!captchaInput.value.trim()) {
        document.getElementById('captchaError').classList.add('show');
        captchaInput.classList.add('error');
        valid = false;
      } else if (captchaInput.value.toUpperCase() !== captchaImg.textContent) {
        document.getElementById('captchaError').textContent = '验证码错误';
        document.getElementById('captchaError').classList.add('show');
        captchaInput.classList.add('error');
        generateCaptcha();
        valid = false;
      } else {
        document.getElementById('captchaError').classList.remove('show');
        captchaInput.classList.remove('error');
      }
      
      return valid;
    }
    
    loginBtn.addEventListener('click', () => {
      if (validate()) {
        loginBtn.classList.add('loading');
        loginBtn.textContent = '登录中...';
        loginBtn.disabled = true;
        
        // 模拟登录
        setTimeout(() => {
          loginBtn.classList.remove('loading');
          loginBtn.textContent = '登录成功';
          loginBtn.style.background = '#52c41a';
          
          setTimeout(() => {
            alert('登录成功！即将跳转到管理后台...');
          }, 500);
        }, 1500);
      }
    });
    
    // 输入时清除错误
    [usernameInput, passwordInput, captchaInput].forEach(input => {
      input.addEventListener('input', () => {
        input.classList.remove('error');
        const errorId = input.id + 'Error';
        document.getElementById(errorId).classList.remove('show');
      });
    });
  </script>
</body>
</html>
