<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Element Plus</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <style>
    :root {
      --el-color-primary: #409eff;
      --el-color-success: #67c23a;
      --el-color-warning: #e6a23c;
      --el-color-danger: #f56c6c;
      --el-color-info: #909399;
      --el-text-color-primary: #303133;
      --el-text-color-regular: #606266;
      --el-text-color-secondary: #909399;
      --el-border-color: #dcdfe6;
      --el-border-radius-base: 4px;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    #app {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .login-container {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
    
    .login-header {
      padding: 30px 40px 20px;
      text-align: center;
      background: linear-gradient(135deg, #409eff 0%, #66b1ff 100%);
    }
    
    .login-header h1 {
      color: #fff;
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    
    .login-header p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
    }
    
    .login-content {
      padding: 30px 40px 40px;
    }
    
    .login-tabs {
      margin-bottom: 24px;
    }
    
    .login-form .el-form-item {
      margin-bottom: 22px;
    }
    
    .login-form .el-input {
      --el-input-border-radius: var(--el-border-radius-base);
    }
    
    .login-form .el-input__wrapper {
      padding: 0 15px;
    }
    
    .login-form .el-input__inner {
      height: 44px;
      line-height: 44px;
    }
    
    .code-input-group {
      display: flex;
      gap: 10px;
    }
    
    .code-input-group .el-input {
      flex: 1;
    }
    
    .code-btn {
      width: 120px;
      height: 44px;
    }
    
    .login-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }
    
    .login-btn {
      width: 100%;
      height: 46px;
      font-size: 16px;
      border-radius: 4px;
    }
    
    .login-footer {
      text-align: center;
      padding-top: 16px;
      border-top: 1px solid #ebeef5;
      margin-top: 20px;
    }
    
    .login-footer a {
      color: var(--el-color-primary);
      text-decoration: none;
      font-size: 14px;
    }
    
    .login-footer a:hover {
      text-decoration: underline;
    }
    
    .other-login {
      margin-top: 20px;
      text-align: center;
    }
    
    .other-login-title {
      color: var(--el-text-color-secondary);
      font-size: 12px;
      margin-bottom: 16px;
      position: relative;
    }
    
    .other-login-title::before,
    .other-login-title::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 60px;
      height: 1px;
      background: var(--el-border-color);
    }
    
    .other-login-title::before {
      left: 30px;
    }
    
    .other-login-title::after {
      right: 30px;
    }
    
    .social-login {
      display: flex;
      justify-content: center;
      gap: 24px;
    }
    
    .social-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 20px;
    }
    
    .social-icon.wechat {
      background: #07c160;
      color: #fff;
    }
    
    .social-icon.qq {
      background: #12b7f5;
      color: #fff;
    }
    
    .social-icon:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="login-container">
      <div class="login-header">
        <h1>企业后台管理系统</h1>
        <p>欢迎登录</p>
      </div>
      
      <div class="login-content">
        <el-tabs v-model="activeTab" class="login-tabs">
          <el-tab-pane label="账号密码登录" name="password">
            <el-form :model="passwordForm" :rules="passwordRules" ref="passwordFormRef" class="login-form">
              <el-form-item prop="username">
                <el-input v-model="passwordForm.username" placeholder="请输入用户名/手机号" prefix-icon="User" size="large"></el-input>
              </el-form-item>
              
              <el-form-item prop="password">
                <el-input v-model="passwordForm.password" type="password" placeholder="请输入密码" prefix-icon="Lock" size="large" show-password></el-input>
              </el-form-item>
              
              <div class="login-options">
                <el-checkbox v-model="passwordForm.remember">记住密码</el-checkbox>
                <el-link type="primary" :underline="false">忘记密码？</el-link>
              </div>
              
              <el-form-item>
                <el-button type="primary" class="login-btn" @click="handlePasswordLogin">登 录</el-button>
              </el-form-item>
            </el-form>
          </el-tab-pane>
          
          <el-tab-pane label="验证码登录" name="code">
            <el-form :model="codeForm" :rules="codeRules" ref="codeFormRef" class="login-form">
              <el-form-item prop="phone">
                <el-input v-model="codeForm.phone" placeholder="请输入手机号" prefix-icon="Phone" size="large">
                  <template #prepend>+86</template>
                </el-input>
              </el-form-item>
              
              <el-form-item prop="code">
                <div class="code-input-group">
                  <el-input v-model="codeForm.code" placeholder="请输入验证码" prefix-icon="Message" size="large"></el-input>
                  <el-button class="code-btn" :disabled="countdown > 0" @click="sendCode">
                    {{ countdown > 0 ? countdown + 's' : '获取验证码' }}
                  </el-button>
                </div>
              </el-form-item>
              
              <el-form-item>
                <el-button type="primary" class="login-btn" @click="handleCodeLogin">登 录</el-button>
              </el-form-item>
            </el-form>
          </el-tab-pane>
        </el-tabs>
        
        <div class="other-login">
          <div class="other-login-title">其他登录方式</div>
          <div class="social-login">
            <div class="social-icon wechat" @click="handleWechatLogin">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.047c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 0 1-.023-.156.49.49 0 0 1 .201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-6.656-6.088V8.89c-.135-.01-.269-.03-.406-.032zm-2.53 3.274c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.969-.982z"/>
              </svg>
            </div>
            <div class="social-icon qq" @click="handleQQLogin">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M12.003 2c-2.265 0-6.29 1.364-6.29 7.325v1.195S3.55 14.96 3.55 17.474c0 .665.17 1.025.281 1.025.114 0 .902-.484 1.748-2.072 0 0-.18 2.197 1.904 3.967 0 0-1.77.495-1.77 1.182 0 .686 4.078.43 6.29.43 2.213 0 6.291.256 6.291-.43 0-.687-1.77-1.182-1.77-1.182 2.085-1.77 1.904-3.967 1.904-3.967.846 1.588 1.634 2.072 1.746 2.072.111 0 .283-.36.283-1.025 0-2.514-2.166-6.954-2.166-6.954V9.325C18.29 3.364 14.268 2 12.003 2z"/>
              </svg>
            </div>
          </div>
        </div>
        
        <div class="login-footer">
          <el-link type="primary">还没有账号？立即注册</el-link>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, reactive } = Vue;
    
    const app = createApp({
      setup() {
        const activeTab = ref('password');
        const countdown = ref(0);
        const passwordFormRef = ref(null);
        const codeFormRef = ref(null);
        
        const passwordForm = reactive({
          username: '',
          password: '',
          remember: false
        });
        
        const codeForm = reactive({
          phone: '',
          code: ''
        });
        
        const passwordRules = {
          username: [
            { required: true, message: '请输入用户名', trigger: 'blur' }
          ],
          password: [
            { required: true, message: '请输入密码', trigger: 'blur' },
            { min: 6, message: '密码长度不能少于6位', trigger: 'blur' }
          ]
        };
        
        const codeRules = {
          phone: [
            { required: true, message: '请输入手机号', trigger: 'blur' },
            { pattern: /^1[3-9]\d{9}$/, message: '请输入正确的手机号', trigger: 'blur' }
          ],
          code: [
            { required: true, message: '请输入验证码', trigger: 'blur' },
            { len: 6, message: '验证码为6位数字', trigger: 'blur' }
          ]
        };
        
        const handlePasswordLogin = () => {
          passwordFormRef.value.validate((valid) => {
            if (valid) {
              ElementPlus.ElMessage.success('登录成功！');
              // TODO: 调用登录API
              console.log('密码登录:', passwordForm);
            }
          });
        };
        
        const handleCodeLogin = () => {
          codeFormRef.value.validate((valid) => {
            if (valid) {
              ElementPlus.ElMessage.success('登录成功！');
              // TODO: 调用验证码登录API
              console.log('验证码登录:', codeForm);
            }
          });
        };
        
        const sendCode = () => {
          if (!codeForm.phone) {
            ElementPlus.ElMessage.warning('请先输入手机号');
            return;
          }
          if (!/^1[3-9]\d{9}$/.test(codeForm.phone)) {
            ElementPlus.ElMessage.warning('请输入正确的手机号');
            return;
          }
          
          // 模拟发送验证码
          ElementPlus.ElMessage.success('验证码已发送');
          countdown.value = 60;
          const timer = setInterval(() => {
            countdown.value--;
            if (countdown.value <= 0) {
              clearInterval(timer);
            }
          }, 1000);
        };
        
        const handleWechatLogin = () => {
          ElementPlus.ElMessage.info('微信登录功能开发中...');
        };
        
        const handleQQLogin = () => {
          ElementPlus.ElMessage.info('QQ登录功能开发中...');
        };
        
        return {
          activeTab,
          countdown,
          passwordFormRef,
          codeFormRef,
          passwordForm,
          codeForm,
          passwordRules,
          codeRules,
          handlePasswordLogin,
          handleCodeLogin,
          sendCode,
          handleWechatLogin,
          handleQQLogin
        };
      }
    });
    
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
