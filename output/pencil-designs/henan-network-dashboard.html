<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>河南省网络拓扑可视化大屏</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:"Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#0a1628 0%,#1a2a4a 50%,#0d1f3c 100%);color:#e0e8f0;overflow:hidden}
    .container{display:grid;grid-template-rows:60px 1fr;grid-template-columns:320px 1fr 320px;height:100vh;gap:12px;padding:12px}
    .header{grid-column:1/-1;display:flex;justify-content:center;align-items:center;position:relative;background:rgba(10,30,60,0.6);border:1px solid rgba(64,158,255,0.3);border-radius:4px}
    .header h1{font-size:28px;font-weight:bold;color:#4a9eff;text-shadow:0 0 20px rgba(74,158,255,0.5);letter-spacing:4px}
    .header-info{position:absolute;right:20px;display:flex;align-items:center;gap:20px;font-size:14px}
    .header-info .time{color:#8ab4f8;font-family:Consolas,monospace}
    .header-info .status{background:#1a5a2a;color:#4ade80;padding:4px 12px;border-radius:4px;font-size:12px}
    .header-info .user{color:#8ab4f8}
    .panel{background:rgba(10,30,60,0.6);border:1px solid rgba(64,158,255,0.3);border-radius:4px;padding:16px;display:flex;flex-direction:column}
    .panel-title{font-size:16px;font-weight:bold;color:#4a9eff;padding-bottom:12px;border-bottom:1px solid rgba(64,158,255,0.3);margin-bottom:16px}
    .left-panel{grid-row:2;grid-column:1}
    .right-panel{grid-row:2;grid-column:3}
    .center-area{grid-row:2;grid-column:2;position:relative;background:rgba(10,30,60,0.4);border:1px solid rgba(64,158,255,0.3);border-radius:4px;overflow:hidden}
    #map-container{width:100%;height:100%;position:relative}
    #map-svg svg{width:100%;height:100%}
    #map-svg path{fill:rgba(74,158,255,0.25)!important;stroke:rgba(100,180,255,0.6)!important;stroke-width:1!important}
    .city-node{position:absolute;border-radius:50%;background:#60a5fa;box-shadow:0 0 8px rgba(74,158,255,0.6);pointer-events:none}
    .city-node.center{background:#4a9eff;box-shadow:0 0 12px rgba(74,158,255,0.8)}
    .city-label{position:absolute;font-size:11px;color:#fff;text-shadow:0 0 4px rgba(0,0,0,0.8);pointer-events:none;white-space:nowrap}
    .pb-node{position:absolute;width:5px;height:5px;border-radius:50%;background:#4ade80;pointer-events:none}
    .module{margin-bottom:16px}
    .module-title{font-size:13px;color:#8ab4f8;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .module-title::before{content:'';width:3px;height:12px;background:#4a9eff;border-radius:2px}
    .ring-chart{width:120px;height:120px;margin:0 auto 10px;position:relative}
    .ring-chart canvas{width:100%;height:100%}
    .ring-value{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:24px;font-weight:bold;color:#4ade80}
    .device-status{display:flex;justify-content:space-around;padding:10px 0}
    .device-item{text-align:center}
    .device-value{font-size:24px;font-weight:bold}
    .device-value.online{color:#4ade80}
    .device-value.offline{color:#f87171}
    .device-label{font-size:12px;color:#8ab4f8;margin-top:4px}
    .bar-chart{height:100px;display:flex;align-items:flex-end;justify-content:space-around;padding:10px 0}
    .bar-item{display:flex;flex-direction:column;align-items:center;gap:4px}
    .bar{width:24px;border-radius:2px 2px 0 0}
    .bar.urgent{height:45px;background:linear-gradient(to top,#dc2626,#f87171)}
    .bar.important{height:65px;background:linear-gradient(to top,#d97706,#fbbf24)}
    .bar.normal{height:85px;background:linear-gradient(to top,#2563eb,#60a5fa)}
    .bar-label{font-size:10px;color:#8ab4f8}
    .alert-list{flex:1;overflow:hidden}
    .alert-table{width:100%;font-size:12px}
    .alert-table th{color:#8ab4f8;text-align:left;padding:8px 4px;border-bottom:1px solid rgba(64,158,255,0.3)}
    .alert-table td{padding:6px 4px;border-bottom:1px solid rgba(64,158,255,0.1)}
    .alert-scroll{height:calc(100% - 30px);overflow-y:auto}
    .line-chart{height:120px;margin:10px 0}
    .line-chart canvas{width:100%;height:100%}
    .top5-chart{height:150px}
    .top5-bar-container{display:flex;flex-direction:column;gap:8px;height:100%;justify-content:space-around}
    .top5-bar-item{display:flex;align-items:center;gap:8px}
    .top5-label{width:50px;font-size:12px;color:#8ab4f8;text-align:right}
    .top5-bar-bg{flex:1;height:16px;background:rgba(64,158,255,0.2);border-radius:2px;overflow:hidden}
    .top5-bar-fill{height:100%;background:linear-gradient(to right,#2563eb,#4a9eff);border-radius:2px}
    .top5-value{width:50px;font-size:12px;color:#4ade80;text-align:right}
    .load-chart{width:100px;height:100px;margin:0 auto;position:relative}
    .load-chart canvas{width:100%;height:100%}
    .load-value{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:bold;color:#4a9eff}
    .legend{position:absolute;bottom:20px;right:20px;display:flex;gap:16px;font-size:12px}
    .legend-item{display:flex;align-items:center;gap:6px}
    .legend-color{width:20px;height:3px;border-radius:1px}
    .legend-color.basic{background:#4a9eff}
    .legend-color.business{background:#4ade80}
    .legend-color.priority{background:#fb923c}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>河南省网络拓扑可视化大屏</h1>
    <div class="header-info">
      <span class="time" id="current-time">2026-03-25 14:00:00</span>
      <span class="status">● 正常</span>
      <span class="user">admin</span>
    </div>
  </div>

  <div class="panel left-panel">
    <div class="panel-title">网络健康与实时告警</div>
    <div class="module">

        <div class="bar-item"><div class="bar normal"></div><div class="bar-label">一般</div></div>

    <div class="module alert-list">

          <tbody id="alert-tbody">
            <tr><td>13:05:22</td><td>洛阳-01</td><td style="color:#fbbf24">重要</td></tr>

            <tr><td>12:15:48</td><td>新乡-02</td><td style="color:#f87171">紧急</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="center-area">
    <div id="map-container">
      <div id="map-svg"></div>
      <svg id="topo-svg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></svg>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-color basic"></div><span>基础网络</span></div>
      <div class="legend-item"><div class="legend-color business"></div><span>业务流量</span></div>
      <div class="legend-item"><div class="legend-color priority"></div><span>高优先级</span></div>
    </div>
  </div>

  <div class="panel right-panel">
    <div class="panel-title">流量与业务分析</div>
    <div class="module">
      <div class="module-title">24小时流量趋势</div>
      <div class="line-chart"><canvas id="traffic-chart"></canvas></div>
    </div>
    <div class="module">
      <div class="module-title">TOP5 地市流量</div>
      <div class="top5-chart">
        <div class="top5-bar-container">
          <div class="top5-bar-item"><div class="top5-label">郑州</div><div class="top5-bar-bg"><div class="top5-bar-fill" style="width:95%"></div></div><div class="top5-value">12.5G</div></div>
          <div class="top5-bar-item"><div class="top5-label">洛阳</div><div class="top5-bar-bg"><div class="top5-bar-fill" style="width:72%"></div></div><div class="top5-value">9.2G</div></div>
          <div class="top5-bar-item"><div class="top5-label">开封</div><div class="top5-bar-bg"><div class="top5-bar-fill" style="width:58%"></div></div><div class="top5-value">7.8G</div></div>
          <div class="top5-bar-item"><div class="top5-label">南阳</div><div class="top5-bar-bg"><div class="top5-bar-fill" style="width:45%"></div></div><div class="top5-value">6.1G</div></div>
          <div class="top5-bar-item"><div class="top5-label">新乡</div><div class="top5-bar-bg"><div class="top5-bar-fill" style="width:38%"></div></div><div class="top5-value">5.2G</div></div>
        </div>
      </div>
    </div>
    <div class="module">
      <div class="module-title">系统负载</div>
      <div class="load-chart"><canvas id="load-ring"></canvas><div class="load-value" id="load-value">67.2%</div></div>
    </div>
  </div>
</div>

<script>
// 更新时间
function updateTime(){document.getElementById('current-time').textContent=new Date().toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).replace(/\//g,'-')}
setInterval(updateTime,1000);updateTime();

2-1-3-10h-2l-2-4-10-4-8 2-2-1 1-9-6-1 2-7h-8l-4-7h-7l-6 5-2-3h-7l-4 3-2-3-4-2 1-3h-2l-1 3-4-1 3-3v-2h-3l-1-2 1-3 4-1 3-3v-2l-6-6 2-4 3-2 7-1v-9l6-2-2-2 7-7 3-9h5l2-6 1 2h2v-2 3l2-4h13l9-9 7-2-2-9 2-1V9l1 1 1-2 1 1V7l1 1 3-5V0l9-14 6-3h7l14-4v-5h2v-3l1 1 1-3 1 1v-3h3l2-3 6 1 6-2v-2l1 2 2-6-2-4 5-1v-5l10-2 7 1 3-10 2-2-1-3 2-2 1-6-5 1-5 7-11 4-1 2-4-1-5 4-5-2-3 1-4 6-8 1-7 7-5-1-8 5-11 4-7 10-5 4-4-2 2-10-2-1 3-1 1-4v-4l-2-3 2-5 10-6v-7l2-2-1-1 4-9-2-7h-2v4l-6 1v-2l-2 4h-2l-1 4-6 3-3-3 1-4-3-2-5-8-5-3-4 3-6-3-3 6-4-1-3 3v8l-6 6h-4l-6 4v-9l-2-3 1-3-6-1-2 3-2-1-2 2-6-2-2 1-3-4-2 2h-9l-3 3h-6l1-3h-2l-5-5h-4l-7-5h-4l-1-3-6-1-2-3h-6l-6-3-2 2-2-3h-2l-1 4-3 1v-4l-2-1-13-1-2-3v-2l2-1-1-2h-3v-4h-2l-1 2-3-3v3l2 2-1 2-3-6-2-1v4h-2l-3 3-4-6-4 1v3h-4l-3-3h-3l1-2-2 1-1-2h-2l-2 4 1 3-3 4 1 6-6 8 3-1v5l-6 2 7 4-1 4h-5l3 4 1 7-3 1-1 2 5 1v2h-2l2 2-1 3-5-2-2 1 3 9-3 10 3 3v2l-2 3-2-2-6 2 3 3-3 1 3 3-2 8 2 3-1 2 4 4v6h-6l-3-5-1 1 1 6-6 8v7l-9 2-3-1-9 8h-3l-1-2-3 1 4 2h-2l-1 2 1 3-10-4-5 1v5l-3 1v4l-2 1v4l-2 1v2l-18-5v3l-2 1 1 8-3-1-4 2-1 4-3 2-10-2-8 8h-6l-1 3v-5l-5-2-2-4-2 2-1-3-2 2 3 4h-5l-4 2-4-2-3 1-3-2-4 1-8-3-4 4H82l2-5-8 3-3-1v-2l-11-3-2 1-8-3 3 6v4l-5 3 3 7-1 18-5-4h-6l-1-2h-8l-2 2-3-2-6 2-1 5-5 3h-3l-1 2-9 2 2 6-5 2-4 7-3 2-1 5h-7l-6 4-6-2-5 4-6-3-7 4-4-2-5 5-7-4-3 1-4 8-11 2-7 6h-2l-1-3-4-1-2 9-9 9h-2l-4-6h-4l-7 8-12-1-8 4-8-4-8 3-6-2-2 5 5 1-4 3v8l3 4 1 5 4 4h4l5 10-1 4h-3l-5 5-1 2 2 5 14 5 1 3h4v2h4l3 3-4 7-3 2v12h3l1-2 4 7v3l3 1v3l-6 3v3l-5 1 3 8h7l6 3 2 4 5 2 2-1 6 13-1 5 7 7 12 4 4 5z"/></svg>`;

// 地市坐标
const cities=[
  {name:'郑州',x:0.50,y:0.43,center:true},{name:'开封',x:0.62,y:0.40},{name:'洛阳',x:0.35,y:0.43},
  {name:'平顶山',x:0.42,y:0.56},{name:'安阳',x:0.52,y:0.13},{name:'鹤壁',x:0.56,y:0.18},
  {name:'新乡',x:0.48,y:0.26},{name:'焦作',x:0.40,y:0.28},{name:'濮阳',x:0.72,y:0.20},
  {name:'许昌',x:0.50,y:0.53},{name:'漯河',x:0.50,y:0.60},{name:'三门峡',x:0.18,y:0.40},
  {name:'南阳',x:0.30,y:0.73},{name:'商丘',x:0.75,y:0.40},{name:'信阳',x:0.48,y:0.83},
  {name:'周口',x:0.62,y:0.60},{name:'驻马店',x:0.50,y:0.70}
];

let frame=0,nodes=[];

function initMap(){
  const container=document.getElementById('map-container');
  const mapDiv=document.getElementById('map-svg');
  mapDiv.innerHTML=henanSvg;
  
  const w=container.offsetWidth,h=container.offsetHeight,pad=50;
  const zz=cities.find(c=>c.center);
  const zx=pad+zz.x*(w-2*pad),zy=pad+zz.y*(h-2*pad);
  
  const topoSvg=document.getElementById('topo-svg');
  topoSvg.innerHTML='';
  frame++;

  // 绘制拓扑连线
  cities.forEach(city=>{
    if(!city.center){
      const cx=pad+city.x*(w-2*pad),cy=pad+city.y*(h-2*pad);
      const colors=['#4a9eff','#4ade80','#fb923c'];
      const color=colors[Math.abs(city.name.charCodeAt(0))%3];
      
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',zx);line.setAttribute('y1',zy);
      line.setAttribute('x2',cx);line.setAttribute('y2',cy);
      line.setAttribute('stroke',color);
      line.setAttribute('stroke-width','1.5');
      line.setAttribute('stroke-dasharray','5,5');
      line.setAttribute('stroke-dashoffset',String(-frame));
      topoSvg.appendChild(line);
    }
  });

  // 清除旧节点
  nodes.forEach(n=>n.remove());
  nodes=[];

  // 绘制城市节点
  cities.forEach(city=>{
    const cx=pad+city.x*(w-2*pad),cy=pad+city.y*(h-2*pad);
    
    const node=document.createElement('div');
    node.className='city-node'+(city.center?' center':'');
    node.style.width=city.center?'18px':'12px';
    node.style.height=city.center?'18px':'12px';
    node.style.left=(cx-(city.center?9:6))+'px';
    node.style.top=(cy-(city.center?9:6))+'px';
    container.appendChild(node);
    nodes.push(node);
    
    const label=document.createElement('div');
    label.className='city-label';
    label.textContent=city.name;
    label.style.left=(cx-city.name.length*5.5)+'px';
    label.style.top=(cy+(city.center?20:14))+'px';
    container.appendChild(label);
    nodes.push(label);
    
    // 郑州核心节点PB
    if(city.center){
      for(let i=0;i<4;i++){
        const angle=Math.PI/4+i*Math.PI/2;
        const pb=document.createElement('div');
        pb.className='pb-node';
        pb.style.left=(zx+Math.cos(angle)*22-2.5)+'px';
        pb.style.top=(zy+Math.sin(angle)*22-2.5)+'px';
        container.appendChild(pb);
        nodes.push(pb);
      }
    }
  });
  
  requestAnimationFrame(initMap);
}

function drawRing(id,pct,c1,c2){
  const canvas=document.getElementById(id);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=120;canvas.height=120;
  ctx.beginPath();ctx.arc(60,60,50,0,Math.PI*2);
  ctx.strokeStyle='rgba(64,158,255,0.2)';ctx.lineWidth=10;ctx.stroke();
  const g=ctx.createLinearGradient(0,0,120,120);g.addColorStop(0,c1);g.addColorStop(1,c2);
  ctx.beginPath();ctx.arc(60,60,50,-Math.PI/2,-Math.PI/2+(pct/100)*Math.PI*2);
  ctx.strokeStyle=g;ctx.lineWidth=10;ctx.lineCap='round';ctx.stroke();
}

function drawLineChart(){
  const canvas=document.getElementById('traffic-chart');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth*2;
  canvas.height=canvas.offsetHeight*2;
  ctx.scale(2,2);
  const w=canvas.offsetWidth,h=canvas.offsetHeight,pad=10;
  const data=Array.from({length:24},(_,i)=>3+Math.random()*5+Math.sin(i/3)*2);
  const max=Math.max(...data);
  
  // 填充渐变
  ctx.beginPath();
  ctx.moveTo(pad,h-pad);
  data.forEach((v,i)=>{const x=pad+i*(w-2*pad)/23,y=h-pad-(v/max)*(h-2*pad);ctx.lineTo(x,y);});
  ctx.lineTo(pad+23*(w-2*pad)/23,h-pad);
  ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'rgba(74,158,255,0.3)');
  g.addColorStop(1,'rgba(74,158,255,0)');
  ctx.fillStyle=g;ctx.fill();
  
  // 线条
  ctx.beginPath();
  ctx.strokeStyle='#4a9eff';ctx.lineWidth=2;
  data.forEach((v,i)=>{const x=pad+i*(w-2*pad)/23,y=h-pad-(v/max)*(h-2*pad);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.stroke();
  
  // 点
  data.forEach((v,i)=>{const x=pad+i*(w-2*pad)/23,y=h-pad-(v/max)*(h-2*pad);ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fillStyle='#4a9eff';ctx.fill();});
}

function updateData(){
  // 更新健康度
  const health=(95+Math.random()*5).toFixed(1);
  document.getElementById('health-value').textContent=health+'%';
  drawRing('health-ring',parseFloat(health),'#4ade80','#22c55e');
  
  // 更新负载
  const load=(60+Math.random()*20).toFixed(1);
  document.getElementById('load-value').textContent=load+'%';
  drawRing('load-ring',parseFloat(load),'#4a9eff','#60a5fa');
  
  // 更新设备数
  const online=1000+Math.floor(Math.random()*50);
  const offline=Math.floor(Math.random()*5);
  document.getElementById('online-count').textContent=online;
  document.getElementById('offline-count').textContent=offline;
}

// 初始化
window.onload=function(){
  initMap();
  drawRing('health-ring',98.5,'#4ade80','#22c55e');
  drawRing('load-ring',67.2,'#4a9eff','#60a5fa');
  drawLineChart();
  setInterval(updateData,3000);
};
</script>
