<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pencil Pages - 页面管理面板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 40px;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, #00d4ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .header p {
      color: #888;
      font-size: 1rem;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 40px;
    }
    .stat-item {
      text-align: center;
      padding: 20px 40px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .stat-item .num {
      font-size: 2.5rem;
      font-weight: bold;
      color: #00d4ff;
    }
    .stat-item .label {
      color: #888;
      font-size: 0.9rem;
      margin-top: 5px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 24px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .card:hover {
      transform: translateY(-5px);
      border-color: #00d4ff;
      box-shadow: 0 10px 40px rgba(0,212,255,0.2);
    }
    .card-preview {
      height: 200px;
      background: #0a0a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .card-preview iframe {
      width: 100%;
      height: 300%;
      border: none;
      transform: scale(0.33);
      transform-origin: top left;
      pointer-events: none;
    }
    .card-preview .placeholder {
      color: #444;
      font-size: 3rem;
    }
    .card-info {
      padding: 20px;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }
    .card-meta {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .tag {
      padding: 4px 10px;
      background: rgba(0,212,255,0.15);
      border-radius: 20px;
      font-size: 0.75rem;
      color: #00d4ff;
    }
    .tag.type-dashboard { background: rgba(255,107,107,0.15); color: #ff6b6b; }
    .tag.type-login { background: rgba(78,205,196,0.15); color: #4ecdc4; }
    .tag.type-admin { background: rgba(255,159,67,0.15); color: #ff9f43; }
    .tag.type-map { background: rgba(108,92,231,0.15); color: #6c5ce7; }
    .card-desc {
      color: #888;
      font-size: 0.85rem;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .card-actions {
      display: flex;
      gap: 10px;
    }
    .btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(90deg, #00d4ff, #00ff88);
      color: #000;
      font-weight: 600;
      border: none;
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }
    .btn-secondary {
      background: transparent;
      color: #888;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-secondary:hover {
      border-color: #00d4ff;
      color: #00d4ff;
    }
    .empty-state {
      text-align: center;
      padding: 60px;
      color: #666;
    }
    .footer {
      text-align: center;
      margin-top: 60px;
      padding-top: 30px;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: #666;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎨 Pencil Pages</h1>
    <p>AI 生成的页面管理面板</p>
  </div>
  
  <div class="stats">
    <div class="stat-item">
      <div class="num">15</div>
      <div class="label">总页面数</div>
    </div>
    <div class="stat-item">
      <div class="num">4</div>
      <div class="label">页面类型</div>
    </div>
    <div class="stat-item">
      <div class="num">2026-03-26</div>
      <div class="label">最近更新</div>
    </div>
  </div>
  
  <div class="grid" id="pagesGrid">
    <!-- 页面卡片将由 JS 生成 -->
  </div>
  
  <div class="footer">
    <p>Powered by Pencil Design System | Cloudflare Pages</p>
  </div>

  <script>
    const pages = [
      {
        title: '全国网络监控大屏',
        file: 'china-network-dashboard.html',
        type: 'dashboard',
        tags: ['大屏', 'ECharts', '地图'],
        desc: '中国地图 + 城市辐射动画，北京为核心节点，三栏布局，实时数据更新'
      },
      {
        title: '全国网络监控（移动版）',
        file: 'china-network-mobile.html',
        type: 'dashboard',
        tags: ['移动端', '大屏', '响应式'],
        desc: '移动端适配版本，单栏堆叠 + Tab 切换'
      },
      {
        title: '河南省NOC网络拓扑监控',
        file: 'henan-noc-dashboard.html',
        type: 'dashboard',
        tags: ['大屏', 'ECharts', '拓扑'],
        desc: '16:9 横向大屏，三栏布局，粒子背景 + 扫描线 + 雷达效果'
      },
      {
        title: '河南省网络拓扑可视化',
        file: 'henan-network-dashboard.html',
        type: 'dashboard',
        tags: ['大屏', 'Canvas', '科技风'],
        desc: '深蓝色科技感风格，三栏式布局，Canvas 绑制地图和图表'
      },
      {
        title: '河南省地图（完整版）',
        file: 'henan-map-v2.html',
        type: 'map',
        tags: ['地图', 'ECharts', 'GeoJSON'],
        desc: '河南省地级市地图，流量连线动画，城市节点辐射效果'
      },
      {
        title: '河南省地图（科技风）',
        file: 'henan-map-tech.html',
        type: 'map',
        tags: ['地图', '科技风'],
        desc: '科技风格河南省地图，发光边界 + 流光效果'
      },
      {
        title: '端口组管理页面',
        file: 'port-group-query.html',
        type: 'admin',
        tags: ['后台', '表格', '查询'],
        desc: '查询功能、复选框交互、分页跳转、操作按钮'
      },
      {
        title: 'Element 登录页',
        file: 'login-element.html',
        type: 'login',
        tags: ['登录', 'Element Plus', '表单'],
        desc: 'Element Plus 风格登录页面，表单验证'
      },
      {
        title: 'Ant Design 登录页',
        file: 'login-page-preview.html',
        type: 'login',
        tags: ['登录', 'Ant Design', '移动端'],
        desc: '移动端登录页面，表单验证，记住密码'
      },
      {
        title: '河南省地图（修复版）',
        file: 'henan-map-fixed.html',
        type: 'map',
        tags: ['地图', '修复'],
        desc: '修复了节点位置偏移问题'
      },
      {
        title: '河南省地图（内嵌数据）',
        file: 'henan-map-inline.html',
        type: 'map',
        tags: ['地图', '内嵌数据'],
        desc: 'GeoJSON 数据内嵌，避免跨域问题'
      },
      {
        title: '河南省地图（完整数据）',
        file: 'henan-map-complete.html',
        type: 'map',
        tags: ['地图', '完整'],
        desc: '使用 _full 后缀获取完整 GeoJSON'
      },
      {
        title: '河南省网络（修复版）',
        file: 'henan-network-fixed.html',
        type: 'dashboard',
        tags: ['大屏', '修复'],
        desc: '修复了地图显示问题'
      },
      {
        title: '河南省网络（完整版）',
        file: 'henan-network-full.html',
        type: 'dashboard',
        tags: ['大屏', '完整'],
        desc: '完整版网络拓扑大屏'
      },
      {
        title: 'Expo 预览页',
        file: 'expo-preview.html',
        type: 'admin',
        tags: ['预览', '展示'],
        desc: '展示页面预览'
      }
    ];

    const typeLabels = {
      dashboard: '大屏',
      login: '登录',
      admin: '后台',
      map: '地图'
    };

    function renderPages() {
      const grid = document.getElementById('pagesGrid');
      grid.innerHTML = pages.map(page => `
        <div class="card">
          <div class="card-preview">
            <iframe src="${page.file}" loading="lazy"></iframe>
          </div>
          <div class="card-info">
            <div class="card-title">${page.title}</div>
            <div class="card-meta">
              <span class="tag type-${page.type}">${typeLabels[page.type]}</span>
              ${page.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
            <div class="card-desc">${page.desc}</div>
            <div class="card-actions">
              <a href="${page.file}" target="_blank" class="btn btn-primary">预览</a>
              <button class="btn btn-secondary" onclick="copyLink('${page.file}')">复制链接</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function copyLink(file) {
      const url = `https://pencil-designs.pages.dev/${file}`;
      navigator.clipboard.writeText(url).then(() => {
        alert('链接已复制: ' + url);
      });
    }

    renderPages();
  </script>
</body>
</html>
