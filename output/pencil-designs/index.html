<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pencil Pages - 页面管理面板</title>
  <!-- Version: 2026-03-30-v3 - Added admin-login-antd -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 40px;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, #00d4ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .header p {
      color: #888;
      font-size: 1rem;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .stat-item {
      text-align: center;
      padding: 20px 40px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .stat-item .num {
      font-size: 2.5rem;
      font-weight: bold;
      color: #00d4ff;
    }
    .stat-item .label {
      color: #888;
      font-size: 0.9rem;
      margin-top: 5px;
    }
    .filters {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: rgba(0,212,255,0.15);
      border-color: #00d4ff;
      color: #00d4ff;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 24px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .card:hover {
      transform: translateY(-5px);
      border-color: #00d4ff;
      box-shadow: 0 10px 40px rgba(0,212,255,0.2);
    }
    .card-preview {
      height: 200px;
      background: #0a0a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .card-preview iframe {
      width: 100%;
      height: 300%;
      border: none;
      transform: scale(0.33);
      transform-origin: top left;
      pointer-events: none;
    }
    .card-preview .placeholder {
      color: #333;
      font-size: 3rem;
    }
    .card-info {
      padding: 20px;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }
    .card-meta {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .tag {
      padding: 4px 10px;
      background: rgba(0,212,255,0.15);
      border-radius: 20px;
      font-size: 0.75rem;
      color: #00d4ff;
    }
    .tag.type-dashboard { background: rgba(255,107,107,0.15); color: #ff6b6b; }
    .tag.type-login { background: rgba(78,205,196,0.15); color: #4ecdc4; }
    .tag.type-admin { background: rgba(255,159,67,0.15); color: #ff9f43; }
    .tag.type-map { background: rgba(108,92,231,0.15); color: #6c5ce7; }
    .card-desc {
      color: #888;
      font-size: 0.85rem;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .card-actions {
      display: flex;
      gap: 10px;
    }
    .btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: all 0.2s;
      border: none;
      background: transparent;
      color: #888;
    }
    .btn-primary {
      background: linear-gradient(90deg, #00d4ff, #00ff88);
      color: #000;
      font-weight: 600;
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }
    .btn-secondary {
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-secondary:hover {
      border-color: #00d4ff;
      color: #00d4ff;
    }
    .footer {
      text-align: center;
      margin-top: 60px;
      padding-top: 30px;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: #666;
      font-size: 0.85rem;
    }
    .loading {
      text-align: center;
      padding: 60px;
      color: #666;
    }
    .new-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ff6b6b;
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎨 Pencil Pages</h1>
    <p>AI 生成的页面管理面板 · 自动同步</p>
  </div>
  
  <div class="stats" id="stats">
    <div class="stat-item">
      <div class="num" id="totalCount">-</div>
      <div class="label">总页面数</div>
    </div>
    <div class="stat-item">
      <div class="num" id="typeCount">-</div>
      <div class="label">页面类型</div>
    </div>
    <div class="stat-item">
      <div class="num" id="lastUpdate">-</div>
      <div class="label">最近更新</div>
    </div>
  </div>
  
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="dashboard">大屏</button>
    <button class="filter-btn" data-filter="map">地图</button>
    <button class="filter-btn" data-filter="login">登录</button>
    <button class="filter-btn" data-filter="admin">后台</button>
  </div>
  
  <div class="grid" id="pagesGrid">
    <div class="loading">加载中...</div>
  </div>
  
  <div class="footer">
    <p>Powered by Pencil Design System | Cloudflare Pages</p>
    <p style="margin-top:8px;color:#444;">新增 HTML 文件后刷新页面即可自动显示</p>
  </div>

  <script>
    // 页面配置（可扩展）
    const pageConfig = {
      // 关键词 -> 类型映射
      keywords: {
        'dashboard': 'dashboard',
        'monitor': 'dashboard',
        '大屏': 'dashboard',
        'topology': 'dashboard',
        'network': 'dashboard',
        'map': 'map',
        '地图': 'map',
        'login': 'login',
        '登录': 'login',
        'admin': 'admin',
        'port': 'admin',
        'query': 'admin',
        '后台': 'admin',
        'chat': 'chat',
        '对话': 'chat',
        'ai': 'chat',
        '聊天': 'chat'
      },
      // 类型标签
      typeLabels: {
        dashboard: '大屏',
        login: '登录',
        admin: '后台',
        map: '地图',
        chat: '对话',
        other: '其他'
      }
    };

    // 已知的页面元数据（手动维护的高优先级）
    const knownPages = {
      'china-network-dashboard-v2.html': {
        title: '全国网络监控大屏（修复版）',
        desc: '修复地图加载问题，使用 jsdelivr CDN 托管 GeoJSON',
        tags: ['大屏', '地图', '修复']
      },
      'register-page.html': {
        title: '用户注册页面',
        desc: '现代化注册页面，支持表单验证、密码强度检测、社交登录',
        tags: ['注册', '表单', '响应式']
      },
      'china-network-dashboard.html': {
        title: '全国网络监控大屏',
        desc: '中国地图 + 城市辐射动画，北京为核心节点，三栏布局',
        tags: ['大屏', 'ECharts', '地图']
      },
      'china-network-mobile.html': {
        title: '全国网络监控（移动版）',
        desc: '移动端适配版本，单栏堆叠 + Tab 切换',
        tags: ['移动端', '响应式']
      },
      'henan-noc-dashboard.html': {
        title: '河南省NOC网络拓扑监控',
        desc: '16:9 横向大屏，三栏布局，粒子背景 + 扫描线',
        tags: ['大屏', 'ECharts', '拓扑']
      },
      'henan-network-dashboard.html': {
        title: '河南省网络拓扑可视化',
        desc: '深蓝色科技感风格，Canvas 绑制地图和图表',
        tags: ['大屏', 'Canvas']
      },
      'henan-map-v2.html': {
        title: '河南省地图（完整版）',
        desc: '河南省地级市地图，流量连线动画',
        tags: ['地图', 'ECharts']
      },
      'port-group-query.html': {
        title: '端口组管理页面',
        desc: '查询功能、复选框交互、分页跳转',
        tags: ['后台', '表格']
      },
      'login-element.html': {
        title: 'Element 登录页',
        desc: 'Element Plus 风格登录页面',
        tags: ['登录', 'Element Plus']
      },
      'login-page-preview.html': {
        title: 'Ant Design 登录页',
        desc: '移动端登录页面，表单验证',
        tags: ['登录', 'Ant Design']
      },
      'admin-login-antd.html': {
        title: '后台登录页（Ant Design）',
        desc: '左侧品牌展示 + 右侧登录表单，社交登录，响应式布局',
        tags: ['登录', '后台', 'Ant Design']
      },
      'ai-chat-interface.html': {
        title: 'AI 对话界面',
        desc: '简洁的 AI 聊天界面，左侧对话列表 + 右侧聊天区域，支持快捷操作',
        tags: ['AI', '对话', '聊天']
      }
    };

    // 所有页面数据
    let allPages = [];
    let currentFilter = 'all';

    // 检测页面类型
    function detectType(filename) {
      const lower = filename.toLowerCase();
      for (const [keyword, type] of Object.entries(pageConfig.keywords)) {
        if (lower.includes(keyword.toLowerCase())) {
          return type;
        }
      }
      return 'other';
    }

    // 生成标题
    function generateTitle(filename) {
      if (knownPages[filename]?.title) {
        return knownPages[filename].title;
      }
      
      // 从文件名生成标题
      let name = filename.replace('.html', '');
      name = name.replace(/[-_]/g, ' ');
      name = name.replace(/([A-Z])/g, ' $1');
      name = name.trim();
      
      // 首字母大写
      return name.split(' ').map(word => 
        word.charAt(0).toUpperCase() + word.slice(1)
      ).join(' ');
    }

    // 生成描述
    function generateDesc(filename, type) {
      if (knownPages[filename]?.desc) {
        return knownPages[filename].desc;
      }
      return `${pageConfig.typeLabels[type] || '自定义'}页面`;
    }

    // 生成标签
    function generateTags(filename, type) {
      if (knownPages[filename]?.tags) {
        return knownPages[filename].tags;
      }
      return [pageConfig.typeLabels[type] || '其他'];
    }

    // 扫描页面
    async function scanPages() {
      const grid = document.getElementById('pagesGrid');
      
      // 已知页面列表（Cloudflare Pages 不支持目录扫描，需要手动维护或用 API）
      // 这里列出所有已知文件
      const htmlFiles = [
        'ai-chat-interface.html',
        'china-network-dashboard-v2.html',
        'register-page.html',
        'china-network-dashboard.html',
        'china-network-mobile.html',
        'henan-noc-dashboard.html',
        'henan-network-dashboard.html',
        'henan-network-fixed.html',
        'henan-network-full.html',
        'henan-map-v2.html',
        'henan-map-tech.html',
        'henan-map-fixed.html',
        'henan-map-inline.html',
        'henan-map-complete.html',
        'port-group-query.html',
        'login-element.html',
        'login-page-preview.html',
        'expo-preview.html',
        'admin-login-antd.html'
      ];

      allPages = htmlFiles.map(file => {
        const type = detectType(file);
        return {
          file,
          title: generateTitle(file),
          type,
          desc: generateDesc(file, type),
          tags: generateTags(file, type)
        };
      });

      updateStats();
      renderPages();
    }

    // 更新统计
    function updateStats() {
      document.getElementById('totalCount').textContent = allPages.length;
      
      const types = new Set(allPages.map(p => p.type));
      document.getElementById('typeCount').textContent = types.size;
      
      document.getElementById('lastUpdate').textContent = new Date().toLocaleDateString('zh-CN');
    }

    // 渲染页面
    function renderPages() {
      const grid = document.getElementById('pagesGrid');
      
      const filtered = currentFilter === 'all' 
        ? allPages 
        : allPages.filter(p => p.type === currentFilter);

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="loading">暂无页面</div>';
        return;
      }

      grid.innerHTML = filtered.map(page => `
        <div class="card" data-type="${page.type}">
          <div class="card-preview">
            <iframe src="${page.file}" loading="lazy"></iframe>
          </div>
          <div class="card-info">
            <div class="card-title">${page.title}</div>
            <div class="card-meta">
              <span class="tag type-${page.type}">${pageConfig.typeLabels[page.type] || '其他'}</span>
              ${page.tags.slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
            <div class="card-desc">${page.desc}</div>
            <div class="card-actions">
              <a href="${page.file}" target="_blank" class="btn btn-primary">预览</a>
              <button class="btn btn-secondary" onclick="copyLink('${page.file}')">复制链接</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 复制链接
    function copyLink(file) {
      const url = `https://pencil-designs.pages.dev/${file}`;
      navigator.clipboard.writeText(url).then(() => {
        const btn = event.target;
        const original = btn.textContent;
        btn.textContent = '已复制!';
        setTimeout(() => btn.textContent = original, 1500);
      });
    }

    // 筛选
    document.getElementById('filters').addEventListener('click', (e) => {
      if (e.target.classList.contains('filter-btn')) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter = e.target.dataset.filter;
        renderPages();
      }
    });

    // 初始化
    scanPages();
  </script>
</body>
</html>
