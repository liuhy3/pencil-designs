    var linesData = flowLines.map(function(flow) {
      var src = cityCenters[flow.src];
      var dst = cityCenters[flow.dst];
      return {
        coords: [src, dst],
        lineStyle: {
          color: flow.value >= 50 ? '#f87171' : flow.value >= 30 ? '#60a5fa' : '#4a9eff',
          width: flow.value >= 50 ? 3 : 2,
          curveness: 0.2
        }
      };
    });
    
    // 生成 effectScatter 数据（节点）
    var nodeData = Object.keys(cityCenters).map(function(name) {
      var fullName = name + '市';
      var value = trafficData.find(function(d) { return d.name === fullName; });
      return {
        name: name,
        value: cityCenters[name].concat(value ? value.value : 30)
      };
    });
    
    var chart = echarts.init(document.getElementById('main'));

            return params.name + '<br/>流量: ' + params.value[2] + 'G';

            return '流量线';

          }
        }

          type: 'map',
          map: 'henan',
          data: trafficData
        },
        // 流量走向线（动态）
        {
          type: 'lines',
          zlevel: 2,
          effect: {
            show: true,
            period: 4,
            trailLength: 0.2,
            symbol: 'arrow',
            symbolSize: 5,
            color: '#fff'
          },
          lineStyle: {
            curveness: 0.2
          },
          data: linesData
        },
        // 节点（动态闪烁）
        {
          type: 'effectScatter',
          coordinateSystem: 'geo',
          zlevel: 3,
          rippleEffect: {
            brushType: 'stroke',
            scale: 4
          },
          symbol: 'circle',
          symbolSize: function(val) {
            return val[2] >= 60 ? 15 : val[2] >= 40 ? 12 : 10;
          },
          itemStyle: {
            color: function(params) {
              var val = params.value[2];
              if (val >= 80) return '#f87171';
              if (val >= 60) return '#fbbf24';
              if (val >= 40) return '#4ade80';
              if (val >= 20) return '#60a5fa';
              return '#0d3b66';
            }
          },
          label: {
            show: true,
            position: 'right',
            formatter: '{b}',
            fontSize: 10,
            color: '#e0e8f0'
          },
          data: nodeData
        }
      ]
    };
    
    chart.setOption(option);
    
    window.addEventListener('resize', function() {
