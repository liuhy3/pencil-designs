<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue 登录页 - Element Plus 风格</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--primary:#409eff;--primary-dark:#337ecc;--primary-light:#a0cfff;--bg-dark:#0f172a;--bg-card:#fff;--text-1:#1e293b;--text-2:#64748b;--border:#e2e8f0}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-dark);min-height:100vh;overflow:hidden}
    .login-container{display:flex;min-height:100vh;width:100%}

    /* ===== 左侧品牌区 ===== */
    .login-brand{flex:1;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .login-brand::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(64,158,255,.15) 0%,transparent 70%);top:-100px;right:-100px;animation:float 8s ease-in-out infinite}
    .login-brand::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(64,158,255,.1) 0%,transparent 70%);bottom:-50px;left:-50px;animation:float 6s ease-in-out infinite reverse}
    @keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}
    .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(64,158,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(64,158,255,.03) 1px,transparent 1px);background-size:60px 60px}
    .deco-circle{position:absolute;border:1px solid rgba(64,158,255,.1);border-radius:50%}
    .deco-circle:nth-child(1){width:300px;height:300px;top:10%;left:15%;animation:spin 30s linear infinite}
    .deco-circle:nth-child(2){width:200px;height:200px;bottom:15%;right:20%;animation:spin 20s linear infinite reverse}
    .deco-circle:nth-child(3){width:150px;height:150px;top:50%;left:60%;animation:spin 25s linear infinite}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    .brand-content{position:relative;z-index:1;text-align:center;padding:40px}
    .brand-logo{width:80px;height:80px;background:linear-gradient(135deg,var(--primary) 0%,#79bbff 100%);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 32px;box-shadow:0 20px 60px rgba(64,158,255,.3)}
    .brand-logo .material-icons-outlined{font-size:42px;color:#fff}
    .brand-title{font-size:36px;font-weight:700;color:#fff;margin-bottom:12px;letter-spacing:-.5px}
    .brand-subtitle{font-size:16px;color:rgba(255,255,255,.5);margin-bottom:48px;line-height:1.6}
    .feature-cards{display:flex;gap:16px}
    .feature-card{background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px;width:160px;text-align:center;transition:all .3s ease}
    .feature-card:hover{background:rgba(255,255,255,.08);transform:translateY(-2px)}
    .feature-card .material-icons-outlined{font-size:28px;color:var(--primary);margin-bottom:8px}
    .feature-card h4{color:rgba(255,255,255,.9);font-size:13px;font-weight:500;margin-bottom:4px}
    .feature-card p{color:rgba(255,255,255,.4);font-size:11px;line-height:1.4}

    /* ===== 右侧登录区 ===== */
    .login-form-area{width:520px;display:flex;align-items:center;justify-content:center;background:var(--bg-card);position:relative}
    .login-form-wrapper{width:380px;padding:20px}
    .form-header{margin-bottom:36px}
    .form-header h2{font-size:28px;font-weight:700;color:var(--text-1);margin-bottom:8px}
    .form-header p{font-size:15px;color:var(--text-2)}

    /* Tab 切换 */
    .login-tabs{display:flex;gap:0;margin-bottom:28px;background:#f1f5f9;border-radius:10px;padding:4px}
    .login-tab{flex:1;text-align:center;padding:10px 0;font-size:14px;font-weight:500;color:var(--text-2);cursor:pointer;border-radius:8px;transition:all .25s;border:none;background:transparent}
    .login-tab.active{background:#fff;color:var(--text-1);box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .login-tab:hover:not(.active){color:var(--text-1)}

    /* 表单 */
    .login-form .el-form-item{margin-bottom:22px}
    .login-form .el-input{height:46px}
    .login-form .el-input__wrapper{border-radius:10px;padding:4px 14px;box-shadow:0 0 0 1px var(--border) inset;transition:all .25s}
    .login-form .el-input__wrapper:hover{box-shadow:0 0 0 1px var(--primary-light) inset}
    .login-form .el-input__wrapper.is-focus{box-shadow:0 0 0 1px var(--primary) inset,0 0 0 3px rgba(64,158,255,.1)}
    .login-form .el-input__inner{font-size:14px;color:var(--text-1)}
    .login-form .el-input__inner::placeholder{color:#94a3b8}

    /* 验证码 */
    .captcha-row{display:flex;gap:12px;align-items:flex-start}
    .captcha-row .el-form-item{flex:1}
    .captcha-img{width:120px;height:46px;border-radius:10px;cursor:pointer;overflow:hidden;flex-shrink:0;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f8fafc,#e2e8f0);position:relative;transition:all .25s;user-select:none}
    .captcha-img:hover{border-color:var(--primary-light);transform:scale(1.02)}
    .captcha-img .material-icons-outlined{font-size:20px;color:var(--text-2);position:absolute;bottom:4px;right:6px;opacity:0;transition:opacity .2s}
    .captcha-img:hover .material-icons-outlined{opacity:1}
    .captcha-canvas{width:100%;height:100%}

    /* 选项行 */
    .form-options{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .form-options .el-checkbox__label{font-size:13px;color:var(--text-2)}
    .forgot-link{font-size:13px;color:var(--primary);cursor:pointer;text-decoration:none;transition:color .2s}
    .forgot-link:hover{color:var(--primary-dark)}

    /* 登录按钮 */
    .login-btn{width:100%;height:46px;border-radius:10px!important;font-size:15px;font-weight:600;letter-spacing:.5px;transition:all .3s!important}
    .login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(64,158,255,.35)!important}
    .login-btn:active{transform:translateY(0)}

    /* 密码眼睛 */
    .pwd-toggle{cursor:pointer;color:var(--text-2);font-size:18px;display:flex;align-items:center;transition:color .2s}
    .pwd-toggle:hover{color:var(--primary)}

    /* 第三方登录 */
    .divider-text{display:flex;align-items:center;margin:28px 0;gap:16px}
    .divider-text::before,.divider-text::after{content:'';flex:1;height:1px;background:var(--border)}
    .divider-text span{font-size:12px;color:#94a3b8;white-space:nowrap}
    .social-login{display:flex;justify-content:center;gap:20px}
    .social-btn{width:44px;height:44px;border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;background:#fff}
    .social-btn:hover{border-color:var(--primary-light);background:#ecf5ff;transform:translateY(-2px)}
    .social-btn svg{width:20px;height:20px}

    /* 注册提示 */
    .register-hint{text-align:center;margin-top:28px;font-size:13px;color:var(--text-2)}
    .register-hint a{color:var(--primary);text-decoration:none;font-weight:500}
    .register-hint a:hover{color:var(--primary-dark)}

    .copyright{position:absolute;bottom:24px;left:0;right:0;text-align:center;font-size:12px;color:#94a3b8}

    /* 二维码 */
    .qr-panel{text-align:center;padding:20px 0}
    .qr-box{width:180px;height:180px;margin:0 auto 16px;background:#f8fafc;border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative}
    .qr-refresh{position:absolute;inset:0;background:rgba(255,255,255,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;cursor:pointer;opacity:0;transition:opacity .2s}
    .qr-box:hover .qr-refresh{opacity:1}
    .qr-refresh .material-icons-outlined{font-size:24px;color:var(--primary);margin-bottom:4px}
    .qr-refresh span{font-size:12px;color:var(--text-2)}
    .qr-tip{font-size:14px;color:var(--text-1);font-weight:500;margin-bottom:4px}
    .qr-sub-tip{font-size:12px;color:var(--text-2)}

    /* 动画 */
    .fade-up-enter-active{transition:all .35s cubic-bezier(.16,1,.3,1)}
    .fade-up-enter-from{opacity:0;transform:translateY(16px)}

    /* 响应式 */
    @media(max-width:960px){.login-brand{display:none}.login-form-area{width:100%}}
    @media(max-width:480px){.login-form-wrapper{width:100%;padding:24px}}
    .el-checkbox__input.is-checked .el-checkbox__inner{background-color:var(--primary);border-color:var(--primary)}
  </style>
</head>
<body>
<div id="app">
  <div class="login-container">
    <!-- 左侧 -->
    <div class="login-brand">
      <div class="grid-bg"></div>
      <div class="deco-circle"></div>
      <div class="deco-circle"></div>
      <div class="deco-circle"></div>
      <div class="brand-content">
        <div class="brand-logo"><span class="material-icons-outlined">hub</span></div>
        <h1 class="brand-title">CloudNova</h1>
        <p class="brand-subtitle">新一代智能云管理平台<br>让运维更简单，让业务更高效</p>
        <div class="feature-cards">
          <div class="feature-card"><span class="material-icons-outlined">security</span><h4>安全可靠</h4><p>多重认证保障</p></div>
          <div class="feature-card"><span class="material-icons-outlined">speed</span><h4>极速响应</h4><p>毫秒级处理速度</p></div>
          <div class="feature-card"><span class="material-icons-outlined">insights</span><h4>智能分析</h4><p>AI 驱动决策</p></div>
        </div>
      </div>
    </div>
    <!-- 右侧 -->
    <div class="login-form-area">
      <div class="login-form-wrapper">
        <div class="form-header">
          <h2>欢迎回来</h2>
          <p>请登录您的账号以继续</p>
        </div>
        <div class="login-tabs">
          <button class="login-tab" :class="{active:loginType==='account'}" @click="switchTab('account')">账号登录</button>
          <button class="login-tab" :class="{active:loginType==='phone'}" @click="switchTab('phone')">手机登录</button>
          <button class="login-tab" :class="{active:loginType==='qrcode'}" @click="switchTab('qrcode')">扫码登录</button>
        </div>

        <!-- 账号密码 -->
        <transition name="fade-up" mode="out-in">
          <div v-if="loginType==='account'" key="account">
            <el-form ref="accountFormRef" :model="accountForm" :rules="accountRules" class="login-form">
              <el-form-item prop="username">
                <el-input v-model="accountForm.username" placeholder="请输入用户名 / 邮箱" size="large">
                  <template #prefix><span class="material-icons-outlined" style="font-size:20px;color:#64748b;margin-right:4px">person</span></template>
                </el-input>
              </el-form-item>
              <el-form-item prop="password">
                <el-input v-model="accountForm.password" :type="showPwd?'text':'password'" placeholder="请输入密码" size="large">
                  <template #prefix><span class="material-icons-outlined" style="font-size:20px;color:#64748b;margin-right:4px">lock</span></template>
                  <template #suffix><span class="pwd-toggle" @click="showPwd=!showPwd"><span class="material-icons-outlined">{{showPwd?'visibility_off':'visibility'}}</span></span></template>
                </el-input>
              </el-form-item>
              <div class="captcha-row">
                <el-form-item prop="captcha">
                  <el-input v-model="accountForm.captcha" placeholder="请输入验证码" size="large">
                    <template #prefix><span class="material-icons-outlined" style="font-size:20px;color:#64748b;margin-right:4px">verified_user</span></template>
                  </el-input>
                </el-form-item>
                <div class="captcha-img" @click="drawCaptcha" title="点击刷新">
                  <canvas ref="captchaCanvas" class="captcha-canvas" width="120" height="46"></canvas>
                  <span class="material-icons-outlined">refresh</span>
                </div>
              </div>
              <div class="form-options">
                <el-checkbox v-model="rememberMe" label="记住密码" />
                <a class="forgot-link" @click="ElMessage.info('请联系管理员重置密码')">忘记密码？</a>
              </div>
              <el-form-item>
                <el-button type="primary" class="login-btn" :loading="loading" @click="handleAccountLogin">登 录</el-button>
              </el-form-item>
            </el-form>
          </div>

          <!-- 手机号 -->
          <div v-else-if="loginType==='phone'" key="phone">
            <el-form ref="phoneFormRef" :model="phoneForm" :rules="phoneRules" class="login-form">
              <el-form-item prop="phone">
                <el-input v-model="phoneForm.phone" placeholder="请输入手机号" size="large">
                  <template #prefix><span class="material-icons-outlined" style="font-size:20px;color:#64748b;margin-right:4px">phone_iphone</span></template>
                </el-input>
              </el-form-item>
              <div class="captcha-row">
                <el-form-item prop="smsCode">
                  <el-input v-model="phoneForm.smsCode" placeholder="请输入验证码" size="large">
                    <template #prefix><span class="material-icons-outlined" style="font-size:20px;color:#64748b;margin-right:4px">sms</span></template>
                  </el-input>
                </el-form-item>
                <el-button type="primary" plain :disabled="smsCd>0" style="height:46px;width:120px;border-radius:10px;font-size:13px;flex-shrink:0" @click="sendSms">{{smsCd>0?smsCd+'s 后重发':'获取验证码'}}</el-button>
              </div>
              <div class="form-options">
                <el-checkbox v-model="agreeTerms">我已阅读并同意 <a href="javascript:;" style="color:var(--primary)">服务条款</a></el-checkbox>
              </div>
              <el-form-item>
                <el-button type="primary" class="login-btn" :loading="loading" @click="handlePhoneLogin">登 录</el-button>
              </el-form-item>
            </el-form>
          </div>

          <!-- 扫码 -->
          <div v-else-if="loginType==='qrcode'" key="qrcode">
            <div class="qr-panel">
              <div class="qr-box">
                <canvas ref="qrCanvas" width="160" height="160"></canvas>
                <div class="qr-refresh" @click="drawQr"><span class="material-icons-outlined">refresh</span><span>点击刷新</span></div>
              </div>
              <div class="qr-tip">打开 CloudNova App 扫码登录</div>
              <div class="qr-sub-tip">扫码后请在手机上确认登录</div>
            </div>
          </div>
        </transition>

        <!-- 第三方 -->
        <template v-if="loginType!=='qrcode'">
          <div class="divider-text"><span>其他登录方式</span></div>
          <div class="social-login">
            <div class="social-btn" title="微信登录" @click="ElMessage.info('微信登录开发中')">
              <svg viewBox="0 0 24 24" fill="#07c160"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.045c.134 0 .24-.108.24-.243 0-.06-.024-.12-.04-.178l-.325-1.233a.582.582 0 0 1-.023-.156.49.49 0 0 1 .201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-7.062-6.122zm-2.892 2.622c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982z"/></svg>
            </div>
            <div class="social-btn" title="钉钉登录" @click="ElMessage.info('钉钉登录开发中')">
              <svg viewBox="0 0 24 24" fill="#3296fa"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.56 11.646a.597.597 0 0 0-.21-.417l-3.004-2.375a.444.444 0 0 0-.557.68l2.027 1.601H7.19a.444.444 0 0 0 0 .888h8.626l-2.027 1.6a.444.444 0 0 0 .557.68l3.004-2.374a.597.597 0 0 0 .21-.283z"/></svg>
            </div>
            <div class="social-btn" title="企业微信登录" @click="ElMessage.info('企业微信登录开发中')">
              <svg viewBox="0 0 24 24" fill="#2BAD13"><path d="M10.634 4.022C6.928 4.022 3.923 6.44 3.923 9.43c0 1.654.925 3.14 2.385 4.18l-.597 1.789a.263.263 0 0 0 .368.299l2.074-1.14c.617.17 1.263.267 1.935.267h.174a5.36 5.36 0 0 1-.166-1.32c0-2.88 2.58-5.22 5.76-5.22h.28c-.585-2.713-3.13-4.753-6.003-4.753h.001z"/></svg>
            </div>
          </div>
          <div class="register-hint">还没有账号？<a href="javascript:;">立即注册</a></div>
        </template>
      </div>
      <div class="copyright">&copy; 2026 CloudNova. All rights reserved.</div>
    </div>
  </div>
</div>

<script>
const{createApp,ref,reactive,onMounted,nextTick}=Vue;
const app=createApp({
  setup(){
    const loginType=ref('account');
    const loading=ref(false);
    const showPwd=ref(false);
    const rememberMe=ref(false);
    const agreeTerms=ref(false);
    const smsCd=ref(0);
    const captchaCanvas=ref(null);
    const qrCanvas=ref(null);
    const captchaCode=ref('');
    const accountFormRef=ref(null);
    const phoneFormRef=ref(null);

    const accountForm=reactive({username:'',password:'',captcha:''});
    const phoneForm=reactive({phone:'',smsCode:''});

    const accountRules={
      username:[{required:true,message:'请输入用户名或邮箱',trigger:'blur'},{min:3,max:50,message:'长度在 3 到 50 个字符',trigger:'blur'}],
      password:[{required:true,message:'请输入密码',trigger:'blur'},{min:6,max:32,message:'长度在 6 到 32 个字符',trigger:'blur'}],
      captcha:[{required:true,message:'请输入验证码',trigger:'blur'},{len:4,message:'验证码为 4 位',trigger:'blur'}]
    };
    const phoneRules={
      phone:[{required:true,message:'请输入手机号',trigger:'blur'},{pattern:/^1[3-9]\d{9}$/,message:'手机号格式不正确',trigger:'blur'}],
      smsCode:[{required:true,message:'请输入验证码',trigger:'blur'},{len:6,message:'验证码为 6 位',trigger:'blur'}]
    };

    function switchTab(t){loginType.value=t;if(t==='account')nextTick(()=>drawCaptcha());if(t==='qrcode')nextTick(()=>drawQr())}

    // 验证码
    function drawCaptcha(){
      const cv=captchaCanvas.value;if(!cv)return;
      const ctx=cv.getContext('2d');
      const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code='';
      ctx.clearRect(0,0,120,46);
      // 背景
      ctx.fillStyle='#f0f4f8';ctx.fillRect(0,0,120,46);
      // 噪点
      for(let i=0;i<40;i++){ctx.fillStyle=`rgba(${Math.random()*150},${Math.random()*150},${Math.random()*150},0.4)`;ctx.fillRect(Math.random()*120,Math.random()*46,2,2)}
      // 干扰线
      for(let i=0;i<4;i++){ctx.beginPath();ctx.strokeStyle=`rgba(${50+Math.random()*150},${50+Math.random()*150},${50+Math.random()*150},0.3)`;ctx.moveTo(Math.random()*120,Math.random()*46);ctx.lineTo(Math.random()*120,Math.random()*46);ctx.stroke()}
      // 文字
      for(let i=0;i<4;i++){
        const c=chars[Math.floor(Math.random()*chars.length)];code+=c;
        ctx.save();ctx.font=`bold ${18+Math.random()*6}px Inter,monospace`;ctx.fillStyle=`rgb(${Math.random()*100},${Math.random()*100},${Math.random()*100})`;
        ctx.translate(18+i*24,30+Math.random()*6-3);ctx.rotate((Math.random()-.5)*.4);ctx.fillText(c,0,0);ctx.restore()
      }
      captchaCode.value=code;
    }

    function drawQr(){
      const cv=qrCanvas.value;if(!cv)return;
      const ctx=cv.getContext('2d');const s=160;const cs=8;const n=s/cs;
      ctx.clearRect(0,0,s,s);ctx.fillStyle='#fff';ctx.fillRect(0,0,s,s);
      ctx.fillStyle='#1e293b';
      // 定位角
      function drawFinder(ox,oy){
        ctx.fillRect(ox,oy,7*cs,cs);ctx.fillRect(ox,oy+6*cs,7*cs,cs);
        ctx.fillRect(ox,oy,cs,7*cs);ctx.fillRect(ox+6*cs,oy,cs,7*cs);
        ctx.fillRect(ox+2*cs,oy+2*cs,3*cs,3*cs);
      }
      drawFinder(0,0);drawFinder((n-7)*cs,0);drawFinder(0,(n-7)*cs);
      // 随机数据
      for(let y=0;y<n;y++)for(let x=0;x<n;x++){
        if((x<7&&y<7)||(x>=n-7&&y<7)||(x<7&&y>=n-7))continue;
        if(Math.random()>.55){ctx.fillStyle=Math.random()>.5?'#1e293b':'#409eff';ctx.fillRect(x*cs,y*cs,cs,cs)}
      }
    }

    function handleAccountLogin(){
      const form=accountFormRef.value;if(!form)return;
      form.validate(valid=>{
        if(!valid)return;
        if(accountForm.captcha.toUpperCase()!==captchaCode.value){ElMessage.error('验证码错误');drawCaptcha();return}
        loading.value=true;
        setTimeout(()=>{loading.value=false;ElMessage.success('登录成功！欢迎回来')},1500)
      })
    }

    function handlePhoneLogin(){
      const form=phoneFormRef.value;if(!form)return;
      if(!agreeTerms.value){ElMessage.warning('请先同意服务条款');return}
      form.validate(valid=>{
        if(!valid)return;
        loading.value=true;
        setTimeout(()=>{loading.value=false;ElMessage.success('登录成功！欢迎回来')},1500)
      })
    }

    function sendSms(){
      if(!/^1[3-9]\d{9}$/.test(phoneForm.phone)){ElMessage.warning('请输入正确的手机号');return}
      smsCd.value=60;
      const t=setInterval(()=>{smsCd.value--;if(smsCd.value<=0)clearInterval(t)},1000);
      ElMessage.success('验证码已发送')
    }

    onMounted(()=>{nextTick(()=>{drawCaptcha();drawQr()})});

    return{loginType,loading,showPwd,rememberMe,agreeTerms,smsCd,captchaCanvas,qrCanvas,
      accountFormRef,phoneFormRef,accountForm,phoneForm,accountRules,phoneRules,
      switchTab,drawCaptcha,drawQr,handleAccountLogin,handlePhoneLogin,sendSms}
  }
});
app.use(ElementPlus);
app.mount('#app');
</script>
</body>
